<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="title desc">
  <title>LibreWolf for Windows — Favicon</title>
  <desc>Minimal wolf-trace mark inside a circle, in LibreWolf-inspired cyan/teal on a deep slate background.</desc>
  <defs>
    <radialGradient id="g" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </radialGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#02131a" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background disc -->
  <circle cx="32" cy="32" r="30" fill="url(#g)" />

  <!-- Stylized wolf trace (two strokes) -->
  <path d="M14 40c6-12 18-18 28-21" fill="none" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#s)"/>
  <path d="M18 44c8-8 20-10 30-11" fill="none" stroke="#14B8A6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Subtle highlight -->
  <ellipse cx="24" cy="22" rx="10" ry="6" fill="#ffffff" fill-opacity="0.04"/>
</svg>